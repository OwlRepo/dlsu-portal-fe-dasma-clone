services:
  dlsu-portal:
    build:
      context: .
    container_name: dlsu-portal
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3000',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
